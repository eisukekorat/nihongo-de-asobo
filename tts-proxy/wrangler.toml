name = "nihongo-tts-proxy"
main = "src/index.js"
compatibility_date = "2024-09-23"

# ローカル開発用
[dev]
port = 8787

# 環境変数は Cloudflare Dashboard で設定してください:
# Workers & Pages > nihongo-tts-proxy > Settings > Variables
#   GOOGLE_TTS_API_KEY = "your-api-key-here"
#   ALLOWED_ORIGIN     = "https://your-domain.com"  (省略可)
